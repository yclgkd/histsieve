<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="optionsTitle">HistSieve Settings</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="page">
      <header class="page__header">
        <h1 data-i18n="optionsTitle">HistSieve Settings</h1>
        <label class="enable-toggle" data-i18n-title="popupToggleEnabled">
          <span class="enable-toggle__label" data-i18n="lblEnableToggle">Enable HistSieve</span>
          <span class="switch">
            <input id="enabled" type="checkbox" />
            <span class="slider"></span>
          </span>
        </label>
      </header>

      <section class="card">
        <h2 data-i18n="sectionCleanup">Scheduled cleanup</h2>

        <label class="row">
          <input id="intervalEnabled" type="checkbox" />
          <span data-i18n="cfgIntervalEnabled">Run on a schedule</span>
        </label>

        <label class="row sub">
          <span data-i18n="cfgIntervalHours">Every</span>
          <input id="intervalHours" type="number" min="1" max="720" step="1" />
          <span data-i18n="cfgHours">hours</span>
        </label>

        <label class="row">
          <input id="onStartup" type="checkbox" />
          <span data-i18n="cfgOnStartup">Run when the browser starts</span>
        </label>

        <fieldset class="scope">
          <legend data-i18n="cfgScope">Cleanup scope</legend>
          <label class="row">
            <input type="radio" name="scope" value="olderThan" />
            <span data-i18n="cfgScopeOlder">Only entries older than</span>
            <input id="olderThanDays" type="number" min="1" max="3650" step="1" />
            <span data-i18n="cfgDays">days</span>
          </label>
          <label class="row">
            <input type="radio" name="scope" value="all" />
            <span data-i18n="cfgScopeAll">All history</span>
          </label>
        </fieldset>

        <div class="row">
          <span class="label" data-i18n="popupLastClean">Last cleanup</span>
          <span id="lastClean" class="value">—</span>
        </div>

        <button id="cleanNow" class="primary" type="button" aria-live="polite"></button>
      </section>

      <section class="card">
        <h2 data-i18n="sectionKeywords">Keyword rules</h2>
        <p class="hint" data-i18n="hintKeywords">
          When a visited URL or page title contains any active keyword, the entry is removed from
          your browser history immediately. Matching is case-insensitive.
        </p>

        <form id="kwForm" class="kw-form">
          <input
            id="kwInput"
            type="text"
            data-i18n-placeholder="phKeyword"
            placeholder="e.g. youtube.com"
            maxlength="200"
            required
          />
          <button type="submit" class="primary" data-i18n="btnAdd">Add</button>
        </form>

        <ul id="kwList" class="kw-list" aria-live="polite"></ul>
        <p id="kwEmpty" class="empty hidden" data-i18n="kwEmpty">No keywords yet.</p>
      </section>

      <footer class="page__footer">
        <span class="page__footer-version">HistSieve <span id="appVersion"></span></span>
        <span class="page__footer-sep">·</span>
        <a
          class="page__footer-link"
          href="https://github.com/yclgkd/histsieve"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
            <path
              fill="currentColor"
              d="M8 0a8 8 0 0 0-2.53 15.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.43 7.43 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.19 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8a8 8 0 0 0-8-8z"
            />
          </svg>
          <span data-i18n="footerViewOnGithub">View on GitHub</span>
        </a>
      </footer>

      <div id="saveStatus" class="save-toast" role="status" aria-live="polite">
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path fill="currentColor" d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z" />
        </svg>
        <span id="saveStatusText"></span>
      </div>
    </main>
    <script type="module" src="./options.ts"></script>
  </body>
</html>
