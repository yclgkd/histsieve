<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="optionsTitle">HistSieve Settings</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="page">
      <header class="page__header">
        <h1 data-i18n="optionsTitle">HistSieve Settings</h1>
        <label class="enable-toggle" data-i18n-title="popupToggleEnabled">
          <span class="enable-toggle__label" data-i18n="lblEnableToggle">Enable HistSieve</span>
          <span class="switch">
            <input id="enabled" type="checkbox" />
            <span class="slider"></span>
          </span>
        </label>
      </header>

      <section class="card">
        <h2 data-i18n="sectionCleanup">Scheduled cleanup</h2>

        <label class="row">
          <input id="intervalEnabled" type="checkbox" />
          <span data-i18n="cfgIntervalEnabled">Run on a schedule</span>
        </label>

        <label class="row sub">
          <span data-i18n="cfgIntervalHours">Every</span>
          <input id="intervalHours" type="number" min="1" max="720" step="1" />
          <span data-i18n="cfgHours">hours</span>
        </label>

        <label class="row">
          <input id="onStartup" type="checkbox" />
          <span data-i18n="cfgOnStartup">Run when the browser starts</span>
        </label>

        <fieldset class="scope">
          <legend data-i18n="cfgScope">Cleanup scope</legend>
          <label class="row">
            <input type="radio" name="scope" value="olderThan" />
            <span data-i18n="cfgScopeOlder">Only entries older than</span>
            <input id="olderThanDays" type="number" min="1" max="3650" step="1" />
            <span data-i18n="cfgDays">days</span>
          </label>
          <label class="row">
            <input type="radio" name="scope" value="all" />
            <span data-i18n="cfgScopeAll">All history</span>
          </label>
        </fieldset>

        <div class="row">
          <span class="label" data-i18n="popupLastClean">Last cleanup</span>
          <span id="lastClean" class="value">—</span>
        </div>

        <button id="cleanNow" class="primary" type="button"></button>
        <div id="cleanResult" class="hint" aria-live="polite"></div>
      </section>

      <section class="card">
        <h2 data-i18n="sectionKeywords">Keyword rules</h2>
        <p class="hint" data-i18n="hintKeywords">
          When a visited URL or page title contains any active keyword, the entry is removed from
          your browser history immediately. Matching is case-insensitive.
        </p>

        <form id="kwForm" class="kw-form">
          <input
            id="kwInput"
            type="text"
            data-i18n-placeholder="phKeyword"
            placeholder="e.g. youtube.com"
            maxlength="200"
            required
          />
          <button type="submit" class="primary" data-i18n="btnAdd">Add</button>
        </form>

        <ul id="kwList" class="kw-list" aria-live="polite"></ul>
        <p id="kwEmpty" class="empty hidden" data-i18n="kwEmpty">No keywords yet.</p>
      </section>

      <div id="saveStatus" class="save-status" aria-live="polite"></div>
    </main>
    <script type="module" src="./options.ts"></script>
  </body>
</html>
