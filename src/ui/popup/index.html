<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="extName">HistSieve</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <h1 class="popup__title" data-i18n="extName">HistSieve</h1>
        <label class="enable-toggle" data-i18n-title="popupToggleEnabled">
          <span class="enable-toggle__label" data-i18n="lblEnableToggle">Enable</span>
          <span class="switch">
            <input id="enabled" type="checkbox" />
            <span class="slider"></span>
          </span>
        </label>
      </header>

      <section class="popup__status">
        <div class="row">
          <span class="label" data-i18n="popupKeywordCount">Keywords</span>
          <span id="kwCount" class="value">0</span>
        </div>
        <div class="row">
          <span class="label" data-i18n="popupLastClean">Last cleanup</span>
          <span id="lastClean" class="value">—</span>
        </div>
      </section>

      <div class="popup__actions">
        <button id="cleanNow" class="primary" type="button" aria-live="polite"></button>
        <button id="openOptions" class="ghost" type="button">
          <svg class="ghost__icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <path
              fill="currentColor"
              d="M19.14 12.94a7.05 7.05 0 0 0 0-1.88l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54a7 7 0 0 0-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.7 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.05 7.05 0 0 0 0 1.88L2.82 14.52a.5.5 0 0 0-.12.64l1.92 3.32c.14.24.42.34.66.22l2.39-.96c.5.39 1.04.7 1.62.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54a7 7 0 0 0 1.62-.94l2.39.96c.24.1.52 0 .66-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.04-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"
            />
          </svg>
          <span data-i18n="popupOpenSettings">Settings</span>
        </button>
      </div>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
